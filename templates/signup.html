<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <title>Sign up - Amazon Price Tracker</title>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hero-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #1a2744 100%);
        }
    </style>
</head>
<body class="bg-slate-50 text-gray-900 min-h-screen flex flex-col">

    <header class="hero-gradient shadow-lg">
        <div class="px-4 sm:px-6 lg:px-8 py-5 flex items-center gap-3">
            <span class="material-icons text-amber-400 text-3xl">price_check</span>
            <a href="{{ url_for('home') }}" class="text-white text-2xl font-bold tracking-tight hover:text-amber-300 transition-colors">
                Amazon Price Tracker
            </a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-10">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 w-full max-w-sm">
            <h1 class="text-xl font-bold text-slate-800 mb-8">Sign up</h1>

            {% if error %}
                <p class="text-red-600 text-sm bg-red-50 border border-red-200 rounded-lg px-3 py-2 mb-6">{{ error }}</p>
            {% endif %}

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2" for="email">Email</label>
                    <input type="email" id="email" name="email" required
                           class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-amber-400">
                </div>
                <div class="mt-8">
                    <label class="block text-sm font-medium text-slate-700 mb-2" for="password">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required minlength="8"
                               class="w-full px-3 py-2 pr-10 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-amber-400">
                        <button type="button" onclick="toggle_password('password', this)"
                                class="absolute inset-y-0 right-0 flex items-center px-3 text-slate-400 hover:text-slate-600 cursor-pointer">
                            <span class="material-icons text-lg">visibility</span>
                        </button>
                    </div>
                    <p class="text-xs text-slate-400 mt-2">At least 8 characters.</p>
                </div>
                <button type="submit"
                        class="w-full mt-8 bg-gradient-to-b from-amber-400 to-amber-500 text-slate-900 px-4 py-2 rounded-lg font-semibold hover:from-amber-300 hover:to-amber-400 transition-all cursor-pointer">
                    Create account
                </button>
            </form>

            <div class="flex items-center gap-3 my-8">
                <span class="flex-1 h-px bg-slate-200"></span>
                <span class="text-xs text-slate-400">or</span>
                <span class="flex-1 h-px bg-slate-200"></span>
            </div>

            <div class="space-y-3">
                <a href="{{ url_for('oauth_login', provider='google') }}"
                   class="flex items-center justify-center gap-2 w-full px-4 py-2 border border-slate-300 rounded-lg font-semibold text-sm text-slate-700 hover:bg-slate-50 transition-colors">
                    <svg class="w-4 h-4" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                    </svg>
                    Continue with Google
                </a>
                <a href="{{ url_for('oauth_login', provider='github') }}"
                   class="flex items-center justify-center gap-2 w-full px-4 py-2 border border-slate-300 rounded-lg font-semibold text-sm text-slate-700 hover:bg-slate-50 transition-colors">
                    <span class="material-icons text-base">code</span>
                    Continue with GitHub
                </a>
            </div>

            <p class="text-sm text-slate-500 mt-10 text-center">
                Already have an account?
                <a href="{{ url_for('login') }}" class="text-amber-600 font-semibold hover:underline">Log in</a>
            </p>
        </div>
    </main>

    <script>
        function toggle_password(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('.material-icons');
            const hidden = input.type === 'password';
            input.type = hidden ? 'text' : 'password';
            icon.textContent = hidden ? 'visibility_off' : 'visibility';
        }
    </script>
</body>
</html>
