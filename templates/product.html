<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/product.css') }}">
    <title>Amazon Price Tracker</title>
</head>
<body>
    <div class="webpage_title"><h1>Amazon Price Tracker</h1></div>
    <div class = "product_container">
        <div class = "product_image">
            {% if img_src != "N/A" %}
                <img src="{{ img_src }}" alt = "product">
            {% endif %}
            <!-- Add else condition -->
        </div>
        <div class = "product_details">
            <p class = "bookmark_name">Product: <a class="product_link" href="https://www.amazon.it/dp/{{ ASIN }}" target="_blank" rel="noopener noreferrer">{{ name }}</a></p>
            {% if price_whole == "Price not found" %}
                <p class = "bookmark_price">Price: {{ price_whole }}</p>
            {% else %}
                <p class = "bookmark_price">Price: € {{ price_whole }}{{ price_fraction }}</p>
            {% endif %}
            <p class = "bookmark_discount">Discount: {{ discount }}</p>
            <p class = "bookmark_ASIN">ASIN: {{ ASIN }}</p>
            <button class = "button bookmark_button" id = "bookmark_button" onclick = "bookmark_product()">Book</button>
        </div>

            <script>
                function bookmark_product(){

                    const details = {
                        ASIN: "{{ ASIN }}",
                        name: "{{ name }}",
                        price_whole: "{{ price_whole }}",
                        price_fraction: "{{ price_fraction }}",
                        discount: "{{ discount }}",
                        img_src: "{{ img_src }}"
                    }

                    fetch("/bookmark", {
                        method: "POST",
                        headers: { "Content-Type" : "application/json"},
                        body: JSON.stringify(details)
                    })
                    .then(response => {
                        if (!response.ok) throw new Error("Network response was not ok");
                        return response.json();
                    })
                    .then(data => {
                        const btn = document.getElementById("bookmark_button");
                        if (data.status === "ok")   btn.innerText = "Booked!";
                        else if (data.status === "full") btn.innerText = "Reached Bookmark Limit";
                        else if (data.status === "duplicate") btn.innerText = "Bookmark Already Exists";
                        else if (data.status === "price_not_found") btn.innerText = "Price Not Found";
                    })
                    .catch(error => {
                        console.error("Error:", error);
                        document.getElementById("bookmark_button").innerText = "Connection Error";
                    });
                }
            </script>
    </div>
</body>
</html>
