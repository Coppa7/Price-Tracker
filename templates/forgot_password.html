<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <title>Forgot password - Amazon Price Tracker</title>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hero-gradient {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #1a2744 100%);
        }
    </style>
</head>
<body class="bg-slate-50 text-gray-900 min-h-screen flex flex-col">

    <header class="hero-gradient shadow-lg">
        <div class="px-4 sm:px-6 lg:px-8 py-5 flex items-center gap-3">
            <span class="material-icons text-amber-400 text-3xl">price_check</span>
            <a href="{{ url_for('home') }}" class="text-white text-2xl font-bold tracking-tight hover:text-amber-300 transition-colors">
                Amazon Price Tracker
            </a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-10">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 w-full max-w-sm">
            <h1 class="text-xl font-bold text-slate-800 mb-8">Forgot password</h1>

            {% if sent %}
                <p class="text-slate-600 text-sm leading-relaxed">
                    If that email is registered, we just sent a password reset link to it.
                    Check your inbox (and spam folder).
                </p>
            {% else %}
                <p class="text-slate-500 text-sm mb-6">
                    Enter your email and we'll send you a link to reset your password.
                </p>

                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2" for="email">Email</label>
                        <input type="email" id="email" name="email" required
                               class="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-amber-400">
                    </div>
                    <button type="submit"
                            class="w-full mt-8 bg-gradient-to-b from-amber-400 to-amber-500 text-slate-900 px-4 py-2 rounded-lg font-semibold hover:from-amber-300 hover:to-amber-400 transition-all cursor-pointer">
                        Send reset link
                    </button>
                </form>
            {% endif %}

            <p class="text-sm text-slate-500 mt-10 text-center">
                <a href="{{ url_for('login') }}" class="text-amber-600 font-semibold hover:underline">Back to log in</a>
            </p>
        </div>
    </main>
</body>
</html>
